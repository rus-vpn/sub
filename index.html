<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение умного VPN</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 340px; width: 90%; }
        h1 { font-size: 20px; color: #1d1d1f; margin: 0 0 10px 0; }
        p { font-size: 14px; color: #86868b; margin: 0 0 20px 0; line-height: 1.4; }
        .btn { display: block; background: #0071e3; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 16px; transition: background 0.2s; border: none; width: 100%; cursor: pointer; }
        .btn:hover { background: #0077ed; }
        .btn.copied { background: #34c759; }
        .status { font-size: 12px; color: #ff3b30; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Настройка Android</h1>
    <p>Нажми на кнопку ниже, чтобы скопировать ключ активации для v2rayNG.</p>
    <button id="copyBtn" class="btn">Скопировать ключ</button>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let rawInput = urlParams.get('token') || urlParams.get('sub');
    const copyBtn = document.getElementById('copyBtn');
    const statusMsg = document.getElementById('statusMsg');

    if (rawInput) {
        const token = rawInput.trim();

        // Регистронезависимая валидация токена/UUID
        const tokenRegex = /^([0-9a-z]{16}|[0-9a-f]{32}|[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12})$/i;

        if (tokenRegex.test(token)) {
            const profileName = encodeURIComponent('Личный VPN');

            // Полностью исправленная строка с твоими актуальными параметрами Reality
            const configString = `vless://${token}@rus-vpn.duckdns.org:25413?type=tcp&security=reality&encryption=none&flow=xtls-rprx-vision&pbk=QgQgUyAcqqsLuPw820ilXzTbJ-UNWTDXhkBS5w1nrTE&fp=chrome&sni=s0.awsstatic.com&sid=6ba85179e30d4fc2&spx=%2F#${profileName}`;

            copyBtn.addEventListener('click', function() {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(configString)
                        .then(() => {
                            showSuccess();
                        })
                        .catch(() => {
                            fallbackCopy(configString);
                        });
                } else {
                    fallbackCopy(configString);
                }
            });
        } else {
            showFatalError('Ошибка: Некорректный формат токена');
        }
    } else {
        showFatalError('Ошибка: Токен отсутствует в ссылке');
    }

    function fallbackCopy(text) {
        try {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            
            textarea.focus();
            textarea.select();
            
            const successful = document.execCommand('copy');
            document.body.removeChild(textarea);

            if (successful) {
                showSuccess();
            } else {
                throw new Error();
            }
        } catch (e) {
            statusMsg.innerText = 'Ошибка копирования. Откройте страницу в обычном браузере.';
            statusMsg.style.display = 'block';
        }
    }

    function showSuccess() {
        copyBtn.innerText = 'Успешно скопировано!';
        copyBtn.classList.add('copied');
        statusMsg.style.display = 'none';
        setTimeout(() => {
            copyBtn.innerText = 'Скопировать ключ';
            copyBtn.classList.remove('copied');
        }, 3000);
    }

    function showFatalError(msg) {
        copyBtn.style.display = 'none';
        statusMsg.innerText = msg;
        statusMsg.style.display = 'block';
    }
</script>

</body>
</html>
