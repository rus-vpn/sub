<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение умного VPN</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 340px; width: 90%; }
        h1 { font-size: 20px; color: #1d1d1f; margin: 0 0 10px 0; }
        p { font-size: 14px; color: #86868b; margin: 0 0 25px 0; line-height: 1.4; }
        .btn { display: block; background: #0071e3; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 16px; transition: background 0.2s; }
        .btn:hover { background: #0077ed; }
    </style>
</head>
<body>
<div class="card">
    <h1>Настройка Android</h1>
    <p>Нажми на кнопку ниже, чтобы автоматически импортировать настройки и умные правила для РФ в приложение sing-box.</p>
    <a id="vpnBtn" class="btn" href="#">Настроить в 1 клик</a>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (token) {
        const subUrl = `http://rus-vpn.duckdns.org:33445/secure-connect-vless/${token}`;
        const template = 'https://raw.githubusercontent.com/sing-box/template/main/clientside-split-tunnel-ru.json';
        const rawProfileUrl = `sing-box://import-remote-profile?url=${encodeURIComponent(subUrl)}&template=${encodeURIComponent(template)}#Личный%20VPN`;
        const androidIntent = `intent://${rawProfileUrl.replace('sing-box://', '')}#Intent;scheme=sing-box;package=io.nekohasekai.singbox;end`;
        document.getElementById('vpnBtn').href = androidIntent;
    } else {
        alert('Ошибка: Токен пользователя отсутствует в ссылке');
    }
</script>
</body>
</html>
