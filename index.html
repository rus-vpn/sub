<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение умного VPN</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f4f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; max-width: 340px; width: 90%; }
        h1 { font-size: 20px; color: #1d1d1f; margin: 0 0 10px 0; }
        p { font-size: 14px; color: #86868b; margin: 0 0 20px 0; line-height: 1.4; }
        .btn { display: block; background: #0071e3; color: white; text-decoration: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 16px; transition: background 0.2s; border: none; width: 100%; cursor: pointer; }
        .btn:hover { background: #0077ed; }
        .btn.copied { background: #34c759; }
        .status { font-size: 12px; color: #ff3b30; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Настройка Android</h1>
    <p>Нажми на кнопку ниже, чтобы скопировать ключ активации для v2rayNG.</p>
    <button id="copyBtn" class="btn">Скопировать ключ</button>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let rawInput = urlParams.get('token') || urlParams.get('sub');

    if (rawInput) {
        let uuid = rawInput.trim();
        
        // Если случайно скопировали полную ссылку, вырезаем из нее только чистый UUID токен
        if (uuid.includes('/')) { uuid = uuid.split('/').pop(); }
        if (uuid.includes('@')) { uuid = uuid.split('@')[0].split('//').pop(); }

        // Идеальная, монолитная Reality строка. Замени ключи pbk и sid на свои из панели!
        const configString = `vless://${uuid}@rus-vpn.duckdns.org:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni=google.com&fp=chrome&pbk=ВСТАВЬ_СЮДА_СВОЙ_PUBLIC_KEY&sid=ВСТАВЬ_СЮДА_СВОЙ_SHORT_ID&type=tcp#Личный%20VPN`;

        const copyBtn = document.getElementById('copyBtn');

        copyBtn.addEventListener('click', function() {
            navigator.clipboard.writeText(configString).then(() => {
                copyBtn.innerText = 'Успешно скопировано!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerText = 'Скопировать ключ';
                    copyBtn.classList.remove('copied');
                }, 3000);
            }).catch(err => {
                const statusMsg = document.getElementById('statusMsg');
                statusMsg.innerText = 'Ошибка доступа к буферу обмена.';
                statusMsg.style.display = 'block';
            });
        });
    } else {
        document.getElementById('copyBtn').style.display = 'none';
        const statusMsg = document.getElementById('statusMsg');
        statusMsg.innerText = 'Ошибка: Токен отсутствует в ссылке';
        statusMsg.style.display = 'block';
    }
</script>

</body>
</html>
